name: Lynch Screener

on:
  schedule:
    # 14:47 UTC evita el peak de :00 → llega ~11:00 AM Santiago (UTC-4 invierno)
    # Invierno Chile (abr–ago): UTC-4 → 14:47 UTC = ~11:00 Santiago
    - cron: '47 14 * * 1-5'
    # Verano Chile (sep–mar):  UTC-3 → cambiar a '47 13 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN:               ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:                 ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_REPOSITORY:                ${{ github.repository }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Telegram connection
        run: |
          echo "TOKEN present: $([ -n "$TELEGRAM_BOT_TOKEN" ] && echo YES || echo NO)"
          echo "CHAT_ID present: $([ -n "$TELEGRAM_CHAT_ID" ] && echo YES || echo NO)"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="🔧 LynchFinder iniciando screener..." \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Telegram OK' if d.get('ok') else f'Telegram ERROR: {d}')"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Lynch screener (USA + Chile)
        run: python src/main.py --mode all --market usa,chile

      - name: Commit HTML report to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "results: update report $(date -u +%Y-%m-%d)"
          git push

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynch-results-${{ github.run_id }}
          path: results/
          retention-days: 30

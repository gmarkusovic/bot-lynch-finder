name: Lynch Screener

on:
  schedule:
    # Runs Monday–Friday at 15:00 UTC (11:00 Santiago CLT/UTC-4)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # needed to commit docs/index.html to repo

    env:
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_REPOSITORY:   ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Lynch screener (USA + Chile)
        run: python src/main.py --mode all --market usa,chile

      - name: Commit HTML report to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "results: update report $(date -u +%Y-%m-%d)"
          git push

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynch-results-${{ github.run_id }}
          path: results/
          retention-days: 30

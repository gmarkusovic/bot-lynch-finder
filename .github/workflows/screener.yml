name: Lynch Screener

on:
  schedule:
    # Invierno Chile (abr–ago): UTC-4
    - cron: '47 14 * * 1-5'  # Chile + watchlist → ~11:00 AM Santiago (~5 min)
    - cron: '47 17 * * 1-5'  # USA            → ~2:00 PM Santiago  (~30 min)
    # Verano Chile (sep–mar): UTC-3 → cambiar a '47 13' y '47 16'
  workflow_dispatch:
    inputs:
      market:
        description: 'Mercado a analizar'
        required: false
        default: 'chile'
        type: choice
        options: ['chile', 'usa', 'europe', 'usa,chile']

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN:               ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:                 ${{ secrets.TELEGRAM_CHAT_ID }}
      CMF_API_KEY:                      ${{ secrets.CMF_API_KEY }}
      GITHUB_REPOSITORY:                ${{ github.repository }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Lynch screener
        run: |
          if [[ "${{ github.event.schedule }}" == "47 17 * * 1-5" ]]; then
            echo "Ejecución USA (tarde)"
            python src/main.py --mode screener --market usa
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Ejecución manual: mercado=${{ inputs.market }}"
            python src/main.py --mode all --market ${{ inputs.market }}
          else
            echo "Ejecución Chile + watchlist (mañana)"
            python src/main.py --mode all --market chile
          fi

      - name: Commit HTML report to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "results: update report $(date -u +%Y-%m-%d)"
          git push

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynch-results-${{ github.run_id }}
          path: results/
          retention-days: 30

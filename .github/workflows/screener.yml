name: Lynch Screener

# Disparado exclusivamente via workflow_dispatch desde cron-job.org.
# GitHub schedule tiene delays de hasta 6h en cuentas gratuitas → no se usa.
on:
  workflow_dispatch:
    inputs:
      market:
        description: 'Mercado a analizar'
        required: false
        default: 'chile'
        type: choice
        options: ['chile', 'usa', 'europe', 'usa,chile']

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    env:
      TELEGRAM_BOT_TOKEN:               ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:                 ${{ secrets.TELEGRAM_CHAT_ID }}
      CMF_API_KEY:                      ${{ secrets.CMF_API_KEY }}
GITHUB_REPOSITORY:                ${{ github.repository }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Lynch screener
        run: |
          MARKET="${{ inputs.market }}"
          MARKET="${MARKET:-chile}"
          echo "Mercado: $MARKET"
          python src/main.py --mode all --market "$MARKET"

      - name: Commit HTML report to docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "results: update report $(date -u +%Y-%m-%d)"
          git push

      - name: Upload CSV results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lynch-results-${{ github.run_id }}
          path: results/
          retention-days: 30


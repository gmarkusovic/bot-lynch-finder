name: Test CMF API

on:
  push:
    paths:
      - '.github/workflows/test_cmf.yml'
      - 'scripts/test_cmf.py'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      CMF_API_KEY: ${{ secrets.CMF_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Test CMF connection
        run: python scripts/test_cmf.py
